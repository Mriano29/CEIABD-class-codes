<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <title>Celsius a Fahrenheit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
      #resultado {
        font-weight:  bold;
        font-size:  1.2rem;
        text-align: center;
      }
    </style>

  </head>
  <body>
    
    <main>
      <div class="container mt-5">
        <div class="row">
          <div class="col-12 col-md-4 offset-md-4">
            <form>
              <div class="mb-3">
                <label for="celsius" class="form-label">Grados Celsius: <span id="lbl-celsius">0</span></label>
                <input type="range" class="form-range" min="-200" max="200" id="celsius" oninput="cambiarCelsius();">
                <div class="form-text">Desliza para cambiar el valor de grados celsius</div>
              </div>
              <div class="mb-3">
                <label for="celsius" class="form-label">Resultado</label>
                <div id="resultado">
                  0 grados fahrenheit son 32 grados celsius
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

    <script type="text/javascript">

      var modelo = null;

      //Cargar modelo
      (async () => {
          console.log("Cargando modelo...");
          modelo = await tf.loadGraphModel("model.json");
          console.log("Modelo cargado...");
      })();

      function cambiarCelsius() {
        var celsius = document.getElementById("celsius").value;
        document.getElementById("lbl-celsius").innerHTML = celsius;
        if (modelo != null) {
          var tensor = tf.tensor2d([[parseFloat(celsius)]], [1, 1]);
          var salida = modelo.predict(tensor);
          var prediccion = salida.dataSync()[0];
          prediccion = Math.round(prediccion * 10) / 10;
          tensor.dispose();
          salida.dispose();
          document.getElementById("resultado").innerHTML = celsius + " farenheit son " + prediccion + " celsius!";
        } else {
          document.getElementById("resultado").innerHTML = "Intenta de nuevo en un momento...";
        }
      }
    </script>
  </body>
</html>
